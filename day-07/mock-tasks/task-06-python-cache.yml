# =============================================================
# MOCK TASK 6 — Python Pip Caching
# =============================================================
# INSTRUCTIONS: Add pip dependency caching to this Python workflow.
# - Cache path for pip on Linux
# - Use hashFiles('requirements.txt') in the key
# - Include restore-keys for partial matches
# 
# TIME TARGET: 5 minutes
# =============================================================

name: Python CI

on:
  push:
    branches: ['*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: Add pip cache step here using actions/cache@v4
      # Hint: Linux pip cache path is ~/.cache/pip
      # Key formula: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt"

      - name: Run tests
        run: python -m pytest 2>/dev/null || echo "No tests found"
