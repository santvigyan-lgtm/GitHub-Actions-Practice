# ===================== DRILL 1 SOLUTION =====================
# workflow_dispatch with 3 inputs (3 min)
name: Speed Drill 1
on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Deployment message'
        required: true
        type: string
      debug:
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false
      env:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Message: ${{ inputs.message }}"
          echo "Debug: ${{ inputs.debug }}"
          echo "Env: ${{ inputs.env }}"

