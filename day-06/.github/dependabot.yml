# Dependabot configuration for GitHub Actions version updates
# This file tells Dependabot to check for new versions of GitHub Actions
# and create PRs to update them automatically

version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    # Group all actions updates into a single PR
    groups:
      actions:
        patterns: ['actions/*']
    # Limit the number of open PRs
    open-pull-requests-limit: 10
    # Add labels to Dependabot PRs
    labels:
      - 'dependencies'
      - 'github-actions'
    # Commit message format
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
