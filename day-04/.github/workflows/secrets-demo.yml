# =============================================================
# Day 4 — Problem 1: Secrets Demo
# =============================================================
# Access repo-level and environment-level secrets
# =============================================================

name: Secrets Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  use-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Access Repo Secret
        run: |
          echo "🔐 Accessing repository secret..."
          echo "DB_PASSWORD is: ${{ secrets.DB_PASSWORD }}"
          # ⬆️ This will show *** in logs — secrets are always masked!

      - name: Check if Secret Exists
        run: |
          if [ -n "${{ secrets.DB_PASSWORD }}" ]; then
            echo "✅ DB_PASSWORD secret is configured"
          else
            echo "❌ DB_PASSWORD secret is NOT set — add it in GitHub Settings"
          fi

      - name: Use Secret in Script
        env:
          DATABASE_URL: "postgres://admin:${{ secrets.DB_PASSWORD }}@db.example.com/mydb"
        run: |
          echo "🗄️ Database URL configured (password masked)"
          echo "URL: $DATABASE_URL"

  use-env-secrets:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Access Environment Secret
        run: |
          echo "🏭 Production environment secret:"
          echo "PROD_API_KEY: ${{ secrets.PROD_API_KEY }}"

      - name: Deploy with Environment Protection
        run: |
          echo "🚀 Deploying to production..."
          echo "This job waited for reviewer approval (if configured)"
          echo "Environment: production"
          echo "✅ Deployment complete!"
