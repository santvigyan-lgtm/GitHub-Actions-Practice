# =============================================================
# Day 1 — Problem 6: Context Variable Explorer
# =============================================================
# Trigger: push (any branch)
# Task: Dump all key context variables to understand them
# =============================================================

name: Context Explorer

on:
  push:
    branches: ['*']

jobs:
  explore-context:
    runs-on: ubuntu-latest
    steps:
      - name: Key Context Variables
        run: |
          echo "=========================================="
          echo "📋 GITHUB CONTEXT VARIABLES"
          echo "=========================================="
          echo "Event Name:  ${{ github.event_name }}"
          echo "Ref:         ${{ github.ref }}"
          echo "Ref Name:    ${{ github.ref_name }}"
          echo "SHA:         ${{ github.sha }}"
          echo "Short SHA:   ${GITHUB_SHA:0:7}"
          echo "Actor:       ${{ github.actor }}"
          echo "Repository:  ${{ github.repository }}"
          echo "Repo Owner:  ${{ github.repository_owner }}"
          echo "Run ID:      ${{ github.run_id }}"
          echo "Run Number:  ${{ github.run_number }}"
          echo "Workflow:    ${{ github.workflow }}"
          echo "Workspace:   ${{ github.workspace }}"
          echo "Server URL:  ${{ github.server_url }}"
          echo "=========================================="

      - name: Runner Context
        run: |
          echo "=========================================="
          echo "🖥️ RUNNER CONTEXT"
          echo "=========================================="
          echo "OS:    ${{ runner.os }}"
          echo "Arch:  ${{ runner.arch }}"
          echo "Name:  ${{ runner.name }}"
          echo "Temp:  ${{ runner.temp }}"
          echo "=========================================="

      - name: Full GitHub Context (JSON)
        run: |
          echo "=========================================="
          echo "📦 FULL GITHUB CONTEXT (JSON)"
          echo "=========================================="
          echo '${{ toJSON(github) }}'
