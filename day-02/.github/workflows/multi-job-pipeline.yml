# =============================================================
# Day 2 — Problem 1: Multi-Job Pipeline
# =============================================================
# build → test → deploy using needs: keyword
# Deploy only runs on main branch
# =============================================================

name: Multi-Job Pipeline

on:
  push:
    branches: ['*']

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      build-time: ${{ steps.set-version.outputs.build-time }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Application
        id: set-version
        run: |
          echo "🏗️ Building application..."
          VERSION="1.0.${{ github.run_number }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build-time=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          echo "✅ Build complete — Version: ${VERSION}"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Run Tests
        run: |
          echo "🧪 Running tests..."
          echo "Testing version: ${{ needs.build.outputs.version }}"
          echo "Build time: ${{ needs.build.outputs.build-time }}"
          echo "✅ All tests passed!"

  deploy:
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Application
        run: |
          echo "🚀 Deploying to production..."
          echo "Version: ${{ needs.build.outputs.version }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "✅ Deployment successful!"

  notify-failure:
    needs: [build, test, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Failure Alert
        run: |
          echo "🚨 Pipeline FAILED!"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Sending alert notification..."
